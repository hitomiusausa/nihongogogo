name: Daily update

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run collector
        run: |
          python -m nihongo_funding_watch run --since-days 14
          python -m nihongo_funding_watch check-links --since-days 14
          python -m nihongo_funding_watch check-duplicates
          python -m nihongo_funding_watch site --since-days 14 --site-dir public
          python -m nihongo_funding_watch export-csv public/items.csv
          mkdir -p docs
          rsync -a --delete public/ docs/
          touch docs/.nojekyll

      - name: Commit updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs public/index.html public/reports data/reports data/nihongo_funding_watch.sqlite3
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update daily watch"
          git push
